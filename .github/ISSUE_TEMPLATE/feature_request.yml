name: ✨ Feature Request
description: Propose a new feature or enhancement for OpenPrep AI
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas! Share your feature request below.
  - type: checkboxes
    id: areas
    attributes:
      label: Affected Areas
      description: Select one or more areas that this feature suggestion affects.
      options:
        - label: Frontend
        - label: Backend
        - label: Database
        - label: AI
        - label: Authentication
        - label: PYQ Analysis
        - label: Study Planner
        - label: Dashboard
        - label: UI/UX
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what the problem is (e.g. "I am frustrated when...").
      placeholder: What issue does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe how the new feature should work...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives Considered
      description: Any alternative solutions or features you have considered.
      placeholder: What other approaches did you think about?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: checklists
    attributes:
      label: Code of Conduct & Contribution Checklist
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
        - label: I have searched existing feature requests to make sure this suggestion is unique.
          required: true
